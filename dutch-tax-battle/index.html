<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <title>ZZP vs Belastingdienst — De Blauwe Wraak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a3a7a" />
  <meta name="description" content="2D arcade-game waarin de ZZP'er terugvecht tegen de Belastingdienst. Leer ondertussen het Nederlandse belastingrecht." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ZZP Wraak" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a3a7a'/%3E%3Ctext x='50%25' y='54%25' font-size='40' text-anchor='middle' dominant-baseline='middle'%3E%F0%9F%92%BC%3C/text%3E%3C/svg%3E" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a3a7a'/%3E%3Ctext x='50%25' y='54%25' font-size='40' text-anchor='middle' dominant-baseline='middle'%3E%F0%9F%92%BC%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div id="app">
    <canvas id="stage" aria-label="ZZP vs Belastingdienst game"></canvas>
    <div id="hud" class="hud hidden">
      <div class="hud-row">
        <div class="hud-cell"><span class="lbl">Score</span><span id="hud-score">0</span></div>
        <div class="hud-cell"><span class="lbl">Golf</span><span id="hud-wave">1</span></div>
        <div class="hud-cell"><span class="lbl">HP</span><span id="hud-hp">100</span></div>
        <div class="hud-cell"><span class="lbl">€</span><span id="hud-money">0</span></div>
      </div>
      <button id="btn-pause" class="btn-icon" aria-label="Pauze">II</button>
    </div>
    <div id="overlay" class="overlay"></div>
    <div id="touch" class="touch hidden" aria-hidden="true">
      <div id="stick" class="stick"><div class="stick-knob"></div></div>
      <button id="fire" class="fire">📄</button>
    </div>
  </div>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
